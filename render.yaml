services:
  - type: web
    name: apphub-api
    runtime: node
    buildCommand: npm install && npm test && npm run db:migrate
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: CLIENT_URL
        sync: false  # Set to your AppHub-Web URL e.g. https://apphub-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: apphub-db
          property: connectionString

databases:
  - name: apphub-db
    plan: free
    databaseName: apphub
    postgresMajorVersion: "16"
